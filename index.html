<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <header class="text-center mt-5 title border-bottom  border-light-subtle">
        <p>Totito!!!</p>
    </header>

    <div class="d-flex justify-content-evenly contenedor-inicio">
        <p class="fs-1 fw-bold">Elegir inicio:</p>
        <button class="btn_O fs-1 fw-bold bg-danger rounded-4">O</button>
        <button class="btn_X fs-1 fw-bold bg-danger rounded-4">X</button>
    </div>

    <div class="contenedor d-flex justify-content-around">

        <div class="d-flex flex-column ">
            <div class="text-center fs-1 fw-bold">
                <p>GANADOS: </p>
            </div>
            <div class="contadores rounded-3 text-center p-5">
                <P class="fs-1">JUGADOR X</P>
                <span class="contador_x fs-1 fw-bold">0</span>
            </div>
            <div class="mt-5 contadores rounded-3 text-center p-5">
                <P class="fs-1">JUGADOR O</P>
                <span class="contador_o fs-1 fw-bold">0</span>
            </div>
        </div>

        <div class="d-flex flex-column align-items-center contenedor-cards mt-5 rounded-5">
            <div class="mt-2">
                <button id="0" class="btn"></button>
                <button id="1" class="btn"></button>
                <button id="2" class="btn"></button>
            </div>
            <div>
                <button id="3" class="btn"></button>
                <button id="4" class="btn"></button>
                <button id="5" class="btn"></button>
            </div>
            <div>
                <button id="6" class="btn"></button>
                <button id="7" class="btn"></button>
                <button id="8" class="btn"></button>
            </div>
        </div>

        <div class="contenedor-turno rounded-2  fw-bolder ">
            <div class="mb-5">
                <p>Turno de : <span class="turno">--</span></p>
            </div>

            <div class="bg-info p-5 mt-5 rounded-5 contenedor-ganador d-none">
                <p class="pGanador">EL GANADOR ES: </p>
                <span class="span-ganador "></span>
            </div>

            <button class="btn-reiniciar rounded-5 fs-1 fw-bolder">Reiniciar<i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>
</body>

</html>
